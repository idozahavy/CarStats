name: accel_stats
description: "Car acceleration measurement app using phone sensors and GPS."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State management
  provider: ^6.1.2

  # Sensors
  sensors_plus: ^6.1.1

  # GPS / Location
  geolocator: ^13.0.2

  # Database (Drift)
  drift: ^2.25.0
  sqlite3_flutter_libs: ^0.5.28

  # Charts
  fl_chart: ^0.70.2

  # Utils
  path_provider: ^2.1.5
  path: ^1.9.1
  intl: ^0.20.2
  shared_preferences: ^2.5.3
  file_picker: ^8.3.7
  share_plus: ^11.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  drift_dev: ^2.25.0
  build_runner: ^2.4.15

flutter:
  uses-material-design: true
  generate: true
